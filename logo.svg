<svg viewBox="0 0 600 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="J.A.W. Japan Abduction Watch">
  <!-- eye: single upper-lid line + hinomaru as iris (Watch = 監視する目) -->
  <path d="M20,58 Q70,34 120,58" fill="none" stroke="#111111" stroke-width="3" stroke-linecap="round"/>
  <circle cx="70" cy="70" r="12" fill="#BC002D"/>
  <!-- wordmark + subtitle share the same left edge (x=150) -->
  <text x="150" y="82" font-family="Helvetica Neue, Arial, sans-serif" font-weight="900" font-size="78" fill="#111111">J.A.W.</text>
  <text x="152" y="118" font-family="Helvetica Neue, Arial, sans-serif" font-weight="700" font-size="15.5" letter-spacing="2.7" fill="#111111">JAPAN ABDUCTION WATCH</text>
</svg>
